<div class="container">
    <!-- Left Welcome Panel -->
    <div class="welcome-panel">
        <div class="logo"> <img src="logo.png" alt="Logo"> </div>
        <h1>Welcome Page</h1>
        <p>Sign in to continue access</p>
        <div class="footer-link">www.yoursite.com</div>
    </div>

    <!-- Right Login Form -->
    <div class="login-panel">
        <h2>Sign In</h2>
        <form>
            <label>Email Address</label>
            <input type="email" placeholder="example@mail.com">
            <label>Password</label>
            <input type="password" placeholder="••••••••">
            <button type="submit" class="continue-btn">CONTINUE <span>&rsaquo;</span></button>
        </form>
        <p class="separator">or Connect with Social Media</p>
        <div class="social-btns">
            <button class="twitter-btn">Sign In With Twitter</button>
            <button class="facebook-btn">Sign In With Facebook</button>
        </div>
    </div>
</div>
